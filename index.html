<style>
:root {
  color-scheme: light dark;
  --red: #6B1212;
  --red-pale: rgba(107,18,18,0.08);
  --bg: #f5f3ef;
  --bg-card: #ffffff;
  --bg-sec: #f0ede8;
  --text: #1a1614;
  --text2: #3d3330;
  --text3: #6b5e59;
  --border: rgba(0,0,0,0.09);
  --border2: rgba(0,0,0,0.15);
  --r: 14px;
  --rsm: 8px;
  --shadow: 0 2px 12px rgba(0,0,0,0.07);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#231a17; --bg-card:#2e2320; --bg-sec:#3a2d29;
    --text:#f0ece8; --text2:#c8bfbb; --text3:#9e918c;
    --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.14);
    --shadow:0 2px 12px rgba(0,0,0,0.4); --red-pale:rgba(107,18,18,0.2);
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh}

.header{background:var(--red);padding:10px 16px 12px;position:sticky;top:0;z-index:100;transition:transform 0.25s ease}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.flag{width:30px;height:20px;border-radius:3px;overflow:hidden;flex-shrink:0;display:flex;flex-direction:column}
.flag-w{flex:1;background:#fff}
.flag-b{flex:1;background:#0039A6}
.flag-r{flex:1;background:#D52B1E}
.header-title{font-family:'Playfair Display',serif;font-size:19px;font-weight:600;color:white;line-height:1.15}
.header-sub{font-size:11px;color:rgba(255,255,255,0.6);margin-top:1px}
.search-wrap{position:relative}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none;opacity:0.65}
.search-input{width:100%;padding:8px 12px 8px 32px;border-radius:var(--rsm);border:none;font-size:14px;font-family:inherit;background:rgba(255,255,255,0.15);color:white}
.search-input::placeholder{color:rgba(255,255,255,0.5)}
.search-input:focus{outline:none;background:rgba(255,255,255,0.22)}

.tabs{display:flex;background:var(--bg-card);border-bottom:1px solid var(--border);position:sticky;z-index:99}
.tab{flex:1;padding:11px 8px;text-align:center;font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;transition:color .2s,border-color .2s}
.tab.active{color:var(--text);border-bottom-color:var(--red)}

.filter-bar{display:flex;gap:7px;padding:8px 14px;overflow-x:auto;scrollbar-width:none;background:var(--bg-card);border-bottom:1px solid var(--border);position:sticky;z-index:98;align-items:center}
.filter-bar::-webkit-scrollbar{display:none}
.pill{padding:4px 12px;border-radius:20px;font-size:12px;font-family:inherit;cursor:pointer;white-space:nowrap;border:1px solid var(--border2);background:var(--bg-card);color:var(--text2);transition:all .15s;flex-shrink:0}
.pill.active{background:var(--red);color:white;border-color:var(--red)}

.content{padding:12px 14px 100px;display:flex;flex-direction:column;gap:10px}
.count{font-size:12px;color:var(--text3);padding:4px 16px 0}

.card{scroll-margin-top:var(--sticky-h,100px);background:var(--bg-card);border-radius:var(--r);border:1px solid var(--border);padding:14px;cursor:pointer;transition:border-color .15s;box-shadow:var(--shadow)}
.card:active{opacity:.9}
.card.selected{border-color:var(--red)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.card-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:500;color:var(--text);line-height:1.3}
.badge{font-size:10px;padding:2px 8px;border-radius:10px;white-space:nowrap;margin-left:8px;flex-shrink:0;font-weight:600}
.badge-t{background:#FEF3C7;color:#92400E}
.badge-r{background:#DCFCE7;color:#166534}
.card-address{font-size:12px;color:var(--text2);margin-bottom:3px}
.card-origin{font-size:12px;color:var(--text2);margin-bottom:8px}
.card-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.stars{font-size:12px;color:#E09B20}
.rev{font-size:11px;color:var(--text3)}
.spill{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.open-now{background:#DCFCE7;color:#166534}
.closed-now{background:#FEE2E2;color:#991B1B}
.opens-soon{background:#FEF3C7;color:#92400E}

.detail{margin-top:12px;border-top:1px solid var(--border);padding-top:12px;display:flex;flex-direction:column;gap:12px}
.slabel{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.hgrid{display:flex;flex-direction:column;gap:2px}
.hrow{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:4px 8px;border-radius:6px}
.hrow.today{background:var(--red-pale)}
.hrow .day{color:var(--text2);min-width:34px;font-weight:500}
.hrow .time{color:var(--text)}
.hrow .time.cd{color:var(--text3);font-style:italic}
.ndot{width:6px;height:6px;border-radius:50%;background:#22C55E;margin-left:6px;flex-shrink:0}
.irow{display:flex;align-items:center;gap:8px;font-size:13px}
.irow a{color:var(--text);text-decoration:none;font-weight:600}
.hbox{font-size:12px;color:var(--text2);background:var(--bg-sec);border-radius:var(--rsm);padding:9px 11px;line-height:1.6}
.rbox{font-size:12px;color:var(--text2);font-style:italic;line-height:1.7;border-left:2px solid var(--red);padding-left:10px}
.tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{font-size:11px;padding:3px 9px;border-radius:12px;border:1px solid var(--border2);color:var(--text2);background:var(--bg-sec);cursor:pointer;transition:all .15s}
.tag:active{opacity:.7}
.tag.match{background:var(--red-pale);border-color:var(--red);color:var(--red);font-weight:600}
.tag:hover{border-color:var(--red);color:var(--red)}

.pcard{background:var(--bg-card);border-radius:var(--r);border:1px solid var(--border);padding:14px;box-shadow:var(--shadow);scroll-margin-top:var(--sticky-h,100px)}
@keyframes flash{0%,100%{border-color:var(--border)}30%,70%{border-color:var(--red);box-shadow:0 0 0 3px var(--red-pale)}}
.pcard.flash{animation:flash .8s ease}
.pname{font-family:'Playfair Display',serif;font-size:16px;font-weight:500;color:var(--text);margin-bottom:3px}
.pdesc{font-size:12px;color:var(--text3);margin-bottom:10px}
.wlist{display:flex;flex-direction:column;gap:6px}
.witem{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--bg-sec);border-radius:var(--rsm);gap:8px}
.wname{font-size:13px;color:var(--text);font-weight:500}
.wsub{font-size:11px;color:var(--text3);margin-top:1px}
.noplaces{font-size:12px;color:var(--text3);padding:4px 0}
.empty{text-align:center;padding:50px 16px;color:var(--text3);font-size:14px}

.back-btn{position:fixed;bottom:24px;left:20px;display:none;align-items:center;gap:7px;padding:10px 16px;border-radius:30px;background:var(--bg-card);border:1px solid var(--border-2);color:var(--text);font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;z-index:200;box-shadow:0 3px 14px rgba(0,0,0,.18)}
.back-btn:active{transform:scale(.96)}
.back-top{position:fixed;bottom:24px;right:20px;width:42px;height:42px;border-radius:50%;background:var(--red);color:white;border:none;font-size:20px;cursor:pointer;box-shadow:0 3px 14px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:200}
.back-top.visible{opacity:1;pointer-events:auto}
.back-top:active{transform:scale(.92)}
.install-banner{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--red);color:white;border-radius:30px;padding:11px 20px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.3);cursor:pointer;display:none;align-items:center;gap:8px;white-space:nowrap;z-index:199}
</style>
</head>

];

var activeTab='lugares', activeFilter='todos', activeCat='todas', selectedId=null, searchQ='';
var deferredPrompt=null;

// --- Historial de navegación ---
var navHistory = null;

function pushHistory(label, originElemId) {
  navHistory = {
    tab: activeTab,
    filter: activeFilter,
    cat: activeCat,
    selectedId: selectedId,
    originElemId: originElemId || null,
    label: label
  };
}

function renderBackBtn() {
  var btn = document.getElementById('back-btn');
  var lbl = document.getElementById('back-btn-label');
  if (!btn || !lbl) return;
  if (!navHistory) {
    btn.style.display = 'none';
  } else {
    lbl.textContent = navHistory.label;
    btn.style.display = 'flex';
  }
}

function goBack() {
  var h = navHistory;
  navHistory = null;
  activeTab = h.tab;
  activeFilter = h.filter;
  activeCat = h.cat;
  selectedId = h.selectedId;
  searchQ = '';
  document.getElementById('search').value = '';
  document.getElementById('tab-lugares').classList.toggle('active', h.tab==='lugares');
  document.getElementById('tab-productos').classList.toggle('active', h.tab==='productos');
  document.getElementById('lugares-filters').style.display = h.tab==='lugares' ? 'flex' : 'none';
  document.getElementById('productos-filters').style.display = h.tab==='productos' ? 'flex' : 'none';
  document.querySelectorAll('#lugares-filters .pill').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('#productos-filters .pill').forEach(function(p){p.classList.remove('active');});
  if (h.tab==='lugares') {
    var pf = document.getElementById('pill-'+h.filter);
    if (pf) pf.classList.add('active');
  } else {
    var cf = document.getElementById('cpill-'+h.cat);
    if (cf) cf.classList.add('active');
  }
  updateStickyTops();
  render();
  // Esperar a que el DOM esté pintado antes de hacer scroll
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      var targetId = h.originElemId;
      // Si no hay originElemId pero volvemos a lugares con una card abierta
      if (!targetId && h.tab === 'lugares' && h.selectedId) {
        targetId = 'card-' + h.selectedId;
      }
      if (targetId) {
        var el = document.getElementById(targetId);
        if (el) scrollToEl(el);
      }
    });
  });
}

var lastScrollY = 0;
var headerHidden = false;

function updateStickyTops() {
  var header = document.getElementById('main-header');
  var tabs = document.getElementById('main-tabs');
  var hh = headerHidden ? 0 : header.offsetHeight;
  tabs.style.top = hh + 'px';
  var th = tabs.offsetHeight;
  var bars = document.querySelectorAll('.filter-bar');
  var fh = 0;
  bars.forEach(function(b) { if (b.style.display !== 'none') fh = b.offsetHeight; });
  ['lugares-filters','productos-filters'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.style.top = (hh + th) + 'px';
  });
  // Actualizar scroll-margin-top dinámicamente
  document.documentElement.style.setProperty('--sticky-h', (hh + th + fh + 8) + 'px');
}

function onScroll() {
  var header = document.getElementById('main-header');
  var y = window.pageYOffset;
  var dy = y - lastScrollY;
  lastScrollY = y;

  // Ocultar header al bajar, mostrar al subir
  if (dy > 6 && y > 80 && !headerHidden) {
    headerHidden = true;
    header.style.transform = 'translateY(-100%)';
    updateStickyTops();
  } else if (dy < -4 && headerHidden) {
    headerHidden = false;
    header.style.transform = 'translateY(0)';
    updateStickyTops();
  }

  // Botón volver arriba
  document.getElementById('back-top').classList.toggle('visible', y > 300);
}

window.addEventListener('load', updateStickyTops);
window.addEventListener('resize', updateStickyTops);
window.addEventListener('scroll', onScroll, {passive: true});

window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault(); deferredPrompt = e;
  document.getElementById('install-banner').style.display = 'flex';
});
function installApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(function() { deferredPrompt=null; document.getElementById('install-banner').style.display='none'; });
}

window.addEventListener('scroll', function() {
  document.getElementById('back-top').classList.toggle('visible', window.scrollY > 300);
});
function scrollToTop() { window.scrollTo({top:0, behavior:'smooth'}); }

function stickyOffset() {
  // Si el header está oculto (translateY -100%) no ocupa espacio visual
  var hh = headerHidden ? 0 : (document.getElementById('main-header') || {offsetHeight:0}).offsetHeight;
  var t = document.getElementById('main-tabs');
  var th = t ? t.offsetHeight : 0;
  var bars = document.querySelectorAll('.filter-bar');
  var fh = 0;
  bars.forEach(function(b) { if (b.style.display !== 'none') fh = b.offsetHeight; });
  return hh + th + fh + 8;
}
function scrollToEl(el) {
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      el.scrollIntoView({behavior: 'smooth', block: 'start'});
    });
  });
}
function toggleCard(id) {
  selectedId = selectedId === id ? null : id;
  render();
  if (selectedId) {
    var el = document.getElementById('card-' + id);
    if (el) scrollToEl(el);
  }
}
function goToPlace(placeId, fromElemId) {
  var place = PLACES.filter(function(p){return p.id===placeId;})[0];
  pushHistory(place ? place.name : 'búsqueda', fromElemId || null);
  setTab('lugares', true);
  searchQ = ''; document.getElementById('search').value = '';
  activeFilter = 'todos';
  document.querySelectorAll('#lugares-filters .pill').forEach(function(p) { p.classList.remove('active'); });
  document.getElementById('pill-todos').classList.add('active');
  selectedId = placeId;
  render();
  setTimeout(function() {
    var el = document.getElementById('card-' + placeId);
    if (el) scrollToEl(el);
  }, 80);
}
function goToProduct(itemId, fromElemId) {
  var item = CATALOG.filter(function(c){return c.id===itemId;})[0];
  pushHistory(item ? item.name : 'búsqueda', fromElemId || null);
  setTab('productos', true);
  searchQ = ''; document.getElementById('search').value = '';
  activeCat = 'todas';
  document.querySelectorAll('#productos-filters .pill').forEach(function(p) { p.classList.remove('active'); });
  document.getElementById('cpill-todas').classList.add('active');
  render();
  setTimeout(function() {
    var el = document.getElementById('prod-' + itemId);
    if (el) {
      scrollToEl(el);
      el.classList.add('flash');
      setTimeout(function() { el.classList.remove('flash'); }, 900);
    }
  }, 80);
}

function getNow() { var n=new Date(); return {day:n.getDay(), h:n.getHours()+n.getMinutes()/60}; }
function getSlots(p,d) { var s=p.schedule[d]; if(!s) return null; return Array.isArray(s[0])?s:[s]; }
function isOpenAt(p,d,h) { var sl=getSlots(p,d); return sl?sl.some(function(r){return h>=r[0]&&h<r[1];}):false; }

function statusInfo(p) {
  var now=getNow(), day=now.day, h=now.h;
  if (isOpenAt(p,day,h)) {
    var sl=getSlots(p,day).filter(function(r){return h>=r[0]&&h<r[1];})[0];
    var m=Math.round((sl[1]-h)*60);
    if (m<=60) return {label:'Cierra en '+m+' min', cls:'opens-soon'};
    return {label:'Abierto ahora', cls:'open-now'};
  }
  for (var i=1; i<=7; i++) {
    var nd=(day+i)%7, sl2=getSlots(p,nd);
    if (sl2) {
      var t0=sl2[0][0], hh=Math.floor(t0), mm=Math.round((t0-hh)*60);
      var ts=hh+':'+(mm===0?'00':('0'+mm).slice(-2))+'h';
      var lbl=i===1?'Abre mañana '+ts:'Abre el '+DAY[nd]+' '+ts;
      return {label:lbl, cls:'closed-now'};
    }
  }
  return {label:'Cerrado', cls:'closed-now'};
}

function fmtT(t) { var hh=Math.floor(t),mm=Math.round((t-hh)*60); return hh+':'+(mm===0?'00':('0'+mm).slice(-2)); }

function scheduleRows(p) {
  var now=getNow(), today=now.day, hNow=now.h;
  return [0,1,2,3,4,5,6].map(function(d) {
    var sl=getSlots(p,d), isToday=d===today, openNow=isToday&&isOpenAt(p,d,hNow);
    var timeStr=sl?sl.map(function(r){return fmtT(r[0])+'–'+fmtT(r[1])+'h';}).join(' / '):'Cerrado';
    return '<div class="hrow'+(isToday?' today':'')+'">'+
      '<span class="day">'+DAY[d]+'</span>'+
      '<span class="time'+(sl?'':' cd')+'">'+timeStr+'</span>'+
      (openNow?'<span class="ndot"></span>':'<span style="width:12px;flex-shrink:0"></span>')+
      '</div>';
  }).join('');
}

function stars(r) { return '★'.repeat(Math.floor(r))+(r-Math.floor(r)>=0.5?'½':'')+' '+r.toFixed(1); }

function catalogTags(p, q) {
  var all=p.items.map(function(id){return CATALOG.filter(function(c){return c.id===id;})[0];}).filter(Boolean);
  if (!all.length) return '';
  var platos=all.filter(function(c){return ['sopas','masas','carnes'].indexOf(c.cat)>=0;});
  var prods =all.filter(function(c){return ['sopas','masas','carnes'].indexOf(c.cat)<0;});
  function group(items, label) {
    if (!items.length) return '';
    var tags=items.map(function(c){
      var m=q&&c.name.toLowerCase().indexOf(q.toLowerCase())>=0;
      return '<span class="tag'+(m?' match':'')+'" onclick="goToProduct(\''+c.id+'\',\'card-'+p.id+'\')">'+c.emoji+' '+c.name+'</span>';
    }).join('');
    return '<div><div class="slabel">'+label+'</div><div class="tags">'+tags+'</div></div>';
  }
  return group(platos,'Platos')+group(prods,'Productos');
}

function setTab(t, internal) {
  if (!internal) navHistory = null;
  activeTab=t; selectedId=null;
  document.getElementById('tab-lugares').classList.toggle('active', t==='lugares');
  document.getElementById('tab-productos').classList.toggle('active', t==='productos');
  document.getElementById('lugares-filters').style.display = t==='lugares'?'flex':'none';
  document.getElementById('productos-filters').style.display = t==='productos'?'flex':'none';
  updateStickyTops();
  render();
}
function setFilter(f) {
  activeFilter=f;
  document.querySelectorAll('#lugares-filters .pill').forEach(function(p){p.classList.remove('active');});
  document.getElementById('pill-'+f).classList.add('active');
  render();
}
function setCat(c) {
  activeCat=c;
  document.querySelectorAll('#productos-filters .pill').forEach(function(p){p.classList.remove('active');});
  document.getElementById('cpill-'+c).classList.add('active');
  render();
}
function onSearch() { searchQ=document.getElementById('search').value; render(); }

function renderLugares() {
  var q=searchQ.toLowerCase(), now=getNow(), day=now.day, h=now.h;
  var list=PLACES.filter(function(p) {
    var tm=!q||p.name.toLowerCase().indexOf(q)>=0||p.address.toLowerCase().indexOf(q)>=0||p.origin.toLowerCase().indexOf(q)>=0||
      p.items.some(function(id){var c=CATALOG.filter(function(x){return x.id===id;})[0]; return c&&c.name.toLowerCase().indexOf(q)>=0;});
    if (!tm) return false;
    if (activeFilter==='tienda')      return p.type==='tienda';
    if (activeFilter==='restaurante') return p.type==='restaurante';
    if (activeFilter==='abierto')     return isOpenAt(p,day,h);
    if (activeFilter==='mejor')       return p.rating>=4.5;
    return true;
  });
  document.getElementById('count').textContent=list.length+' establecimiento'+(list.length!==1?'s':'')+' encontrado'+(list.length!==1?'s':'');
  if (!list.length) { document.getElementById('list').innerHTML='<div class="empty">No se encontraron establecimientos.</div>'; return; }
  document.getElementById('list').innerHTML=list.map(function(p) {
    var st=statusInfo(p), sel=selectedId===p.id;
    return '<div class="card'+(sel?' selected':'')+'" id="card-'+p.id+'" onclick="toggleCard('+p.id+')">'+
      '<div class="card-header">'+
        '<div class="card-name">'+p.name+'</div>'+
        '<span class="spill '+st.cls+'">'+st.label+'</span>'+
      '</div>'+
      '<div class="card-address">📍 '+p.address+'</div>'+
      '<div class="card-origin">'+(p.type==='tienda'?'🏪 Tienda':'🍽 Restaurante')+' · '+p.origin+'</div>'+
      '<div class="card-meta">'+
        '<span class="stars">'+stars(p.rating)+'</span>'+
        '<span class="rev">('+p.reviews+' reseñas)</span>'+
      '</div>'+
      (sel?'<div class="detail" onclick="event.stopPropagation()">'+
        '<div><div class="slabel">Horarios</div><div class="hgrid">'+scheduleRows(p)+'</div></div>'+
        (p.phone?'<div class="irow"><span style="font-size:14px">📞</span><a href="tel:'+p.phone+'">'+p.phone+'</a></div>':'')+
        (p.web?'<div class="irow"><span style="font-size:14px">🌐</span><a href="'+p.web+'" target="_blank" rel="noopener">'+p.web.replace('https://','').replace('http://','')+'</a></div>':'')+
        '<div class="hbox">'+p.highlight+'</div>'+
        catalogTags(p,searchQ)+
        '<div class="rbox">'+p.topReview+'</div>'+
      '</div>':'')+
    '</div>';
  }).join('');
}

function renderProductos() {
  var q=searchQ.toLowerCase();
  var items=CATALOG.filter(function(c) {
    var cm=activeCat==='todas'||c.cat===activeCat;
    var tm=!q||c.name.toLowerCase().indexOf(q)>=0||c.desc.toLowerCase().indexOf(q)>=0;
    return cm&&tm;
  });
  document.getElementById('count').textContent=items.length+' plato'+(items.length!==1?'s / productos':' / producto')+' encontrado'+(items.length!==1?'s':'');
  if (!items.length) { document.getElementById('list').innerHTML='<div class="empty">No se encontraron platos o productos.</div>'; return; }
  document.getElementById('list').innerHTML=items.map(function(item) {
    var places=PLACES.filter(function(p){return p.items.indexOf(item.id)>=0;});
    return '<div class="pcard" id="prod-'+item.id+'">'+
      '<div class="pname">'+item.emoji+' '+item.name+'</div>'+
      '<div class="pdesc">'+item.desc+'</div>'+
      '<div class="slabel">Dónde encontrarlo</div>'+
      '<div class="wlist">'+
      (places.length?places.map(function(p) {
        var st=statusInfo(p);
        var stars='★'.repeat(Math.floor(p.rating))+(p.rating-Math.floor(p.rating)>=0.5?'½':'')+' '+p.rating.toFixed(1);
        return '<div class="witem" onclick="goToPlace('+p.id+',\'prod-'+item.id+'\')" style="cursor:pointer">'+
          '<div style="flex:1;min-width:0">'+
            '<div class="wname">'+p.name+'</div>'+
            '<div class="wsub">'+(p.type==='tienda'?'🏪 Tienda':'🍽 Restaurante')+' &middot; <span style="color:#E09B20">'+stars+'</span></div>'+
          '</div>'+
          '<div style="display:flex;align-items:center;gap:6px;flex-shrink:0">'+
            '<span class="spill '+st.cls+'" style="font-size:10px">'+st.label+'</span>'+
            '<span style="color:var(--text-3);font-size:16px;line-height:1">›</span>'+
          '</div>'+
        '</div>';
      }).join(''):'<div class="noplaces">No disponible en ningún lugar registrado.</div>')+
      '</div></div>';
  }).join('');
}

function render() {
  if (activeTab==='lugares') renderLugares();
  else renderProductos();
  renderBackBtn();
}

render();
setInterval(render, 60000);

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
